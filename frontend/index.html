<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PasswordInspector</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:#2e3250;--accent:#4f8ef7;--accent2:#7c5cfc;
  --danger:#e05252;--success:#3ecf8e;--warn:#f0a030;
  --text:#e2e8f0;--muted:#8892a4;
  --radius:8px;--font:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
a{color:var(--accent)}

/* layout */
#app{display:flex;flex-direction:column;height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 24px;display:flex;align-items:center;gap:24px;height:52px;flex-shrink:0}
nav .logo{font-weight:700;font-size:1.1rem;color:var(--accent);letter-spacing:.5px}
nav button{background:none;border:none;color:var(--muted);cursor:pointer;
           font-size:.9rem;padding:6px 10px;border-radius:var(--radius);transition:.15s}
nav button:hover,nav button.active{background:var(--surface2);color:var(--text)}
#content{flex:1;overflow:auto;padding:24px}

/* panels */
.panel{display:none}.panel.active{display:block}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:1rem;font-weight:600;margin-bottom:14px;color:var(--text)}

/* form controls */
input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
             padding:8px 12px;border-radius:var(--radius);font-size:.9rem;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--accent)}
label{font-size:.82rem;color:var(--muted);display:block;margin-bottom:4px}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.row .grow{flex:1;min-width:160px}

/* buttons */
.btn{padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;
     font-size:.88rem;font-weight:500;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.15)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{filter:brightness(1.15)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* upload drop zone */
#dropzone{border:2px dashed var(--border);border-radius:var(--radius);
          padding:40px;text-align:center;cursor:pointer;transition:.2s;color:var(--muted)}
#dropzone:hover,#dropzone.dragover{border-color:var(--accent);color:var(--accent)}
#dropzone input{display:none}

/* progress */
.progress-wrap{background:var(--surface2);border-radius:20px;height:10px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
.stat-row{display:flex;gap:20px;flex-wrap:wrap;font-size:.82rem;color:var(--muted);margin-top:8px}
.stat-row span b{color:var(--text)}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:var(--surface2);color:var(--muted);font-weight:600;
   padding:8px 12px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--border)}
td{padding:7px 12px;border-bottom:1px solid var(--border);word-break:break-all;max-width:320px}
tr:hover td{background:var(--surface2)}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;
          border-radius:4px;font-size:.75rem;transition:.15s;margin-left:4px}
.copy-btn:hover{color:var(--accent);background:var(--surface)}

/* pagination */
.pagination{display:flex;align-items:center;gap:8px;margin-top:12px;justify-content:flex-end}
.pagination button{background:var(--surface2);border:1px solid var(--border);color:var(--text);
                   padding:5px 10px;border-radius:var(--radius);cursor:pointer;font-size:.82rem}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .page-info{font-size:.82rem;color:var(--muted)}

/* failed lines */
.fail-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
           padding:12px;margin-bottom:10px}
.fail-raw{font-family:monospace;font-size:.82rem;color:var(--warn);word-break:break-all;margin-bottom:10px}
.fail-fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.fail-fields input{flex:1;min-width:100px}

/* toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);
       border-radius:var(--radius);padding:12px 18px;font-size:.88rem;
       box-shadow:0 4px 20px #0006;opacity:0;pointer-events:none;transition:.3s;z-index:9999}
#toast.show{opacity:1}
#toast.ok{border-color:var(--success);color:var(--success)}
#toast.err{border-color:var(--danger);color:var(--danger)}

/* badge */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-ok{background:#1a3a2a;color:var(--success)}
.badge-err{background:#3a1a1a;color:var(--danger)}
.badge-pending{background:#2a2a1a;color:var(--warn)}
.badge-processing{background:#1a2540;color:var(--accent)}

@media(max-width:600px){
  #content{padding:12px}
  .row{flex-direction:column}
}
</style>
</head>
<body>
<div id="app">
  <nav>
    <span class="logo">🔍 PasswordInspector</span>
    <button id="nav-query" class="active" onclick="showPanel('query')">查询</button>
    <button id="nav-upload" onclick="showPanel('upload')">导入</button>
  </nav>
  <div id="content">

    <!-- ===== QUERY PANEL ===== -->
    <div id="panel-query" class="panel active">
      <div class="card">
        <h2>凭据查询</h2>
        <div class="row" style="margin-bottom:12px">
          <div class="grow">
            <label>搜索关键词</label>
            <input id="q-input" type="text" placeholder="输入关键词…" style="width:100%"
                   onkeydown="if(event.key==='Enter')doSearch()"/>
          </div>
          <div>
            <label>字段</label>
            <select id="q-field">
              <option value="all">全部字段</option>
              <option value="domain">Domain</option>
              <option value="username">Username</option>
              <option value="password">Password</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:6px;padding-bottom:2px">
            <input type="checkbox" id="q-exact" style="width:auto"/>
            <label for="q-exact" style="margin:0;cursor:pointer">精确匹配</label>
          </div>
          <button class="btn btn-primary" onclick="doSearch()">搜索</button>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost" onclick="exportData('csv')">导出 CSV</button>
            <button class="btn btn-ghost" onclick="exportData('json')">导出 JSON</button>
          </div>
        </div>
        <div id="q-summary" style="font-size:.82rem;color:var(--muted);margin-bottom:8px"></div>
        <div class="tbl-wrap">
          <table id="q-table">
            <thead>
              <tr>
                <th>Domain</th><th>URL</th><th>Username</th><th>Password</th>
                <th>首次录入</th><th>来源</th>
              </tr>
            </thead>
            <tbody id="q-tbody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button id="pg-prev" onclick="changePage(-1)" disabled>‹ 上一页</button>
          <span class="page-info" id="pg-info"></span>
          <button id="pg-next" onclick="changePage(1)" disabled>下一页 ›</button>
          <select id="pg-size" onchange="state.pageSize=+this.value;state.page=1;doSearch()">
            <option value="50">50 条/页</option>
            <option value="100">100 条/页</option>
            <option value="200">200 条/页</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ===== UPLOAD PANEL ===== -->
    <div id="panel-upload" class="panel">
      <div class="card">
        <h2>导入数据文件</h2>
        <div id="dropzone" onclick="document.getElementById('file-input').click()"
             ondragover="dz_over(event)" ondragleave="dz_leave()" ondrop="dz_drop(event)">
          <input type="file" id="file-input" accept=".txt,.csv" onchange="startUpload(this.files[0])"/>
          <div style="font-size:2rem;margin-bottom:8px">📂</div>
          <div>点击选择文件，或拖拽到此处</div>
          <div style="font-size:.8rem;margin-top:6px">支持 .txt / .csv，文件大小不限</div>
        </div>
      </div>

      <div id="job-status" style="display:none">
        <div class="card">
          <h2>导入进度</h2>
          <div id="job-filename" style="color:var(--muted);font-size:.85rem;margin-bottom:8px"></div>
          <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
          <div class="stat-row">
            <span>状态: <b id="job-state-badge"></b></span>
            <span>已处理: <b id="st-bytes"></b></span>
            <span>总行数: <b id="st-lines"></b></span>
            <span>已导入: <b id="st-ok"></b></span>
            <span>解析失败: <b id="st-fail"></b></span>
          </div>
          <div id="job-err" style="color:var(--danger);font-size:.82rem;margin-top:8px"></div>
        </div>

        <div id="failed-section" style="display:none">
          <div class="card">
            <h2>⚠️ 无法解析的条目 — 请手动处理</h2>
            <div id="failed-list"></div>
            <div style="margin-top:12px;display:flex;gap:8px">
              <button class="btn btn-ghost" onclick="discardAll()">全部忽略</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const API = '';  // same origin via nginx proxy

// ── state ──────────────────────────────────────────────────────────────────
const state = { page: 1, pageSize: 50, total: 0, lastQuery: null };
let pollTimer = null;
let currentJobId = null;

// ── nav ────────────────────────────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

// ── toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 2800);
}

// ── copy ───────────────────────────────────────────────────────────────────
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('已复制')).catch(() => {
    // fallback for non-HTTPS
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('已复制');
  });
}

// ── helpers ────────────────────────────────────────────────────────────────
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}
function fmtDate(s) {
  return new Date(s).toLocaleString('zh-CN', { hour12: false });
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── query ──────────────────────────────────────────────────────────────────
function doSearch(resetPage = true) {
  if (resetPage) state.page = 1;
  const q = document.getElementById('q-input').value.trim();
  const field = document.getElementById('q-field').value;
  const exact = document.getElementById('q-exact').checked;
  state.lastQuery = { q, field, exact };
  fetchPage();
}

async function fetchPage() {
  const { q, field, exact } = state.lastQuery || { q:'', field:'all', exact:false };
  const ps = state.pageSize;
  const url = `${API}/api/query?q=${encodeURIComponent(q)}&field=${field}&exact=${exact}&page=${state.page}&page_size=${ps}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    state.total = data.total;
    renderTable(data.items);
    renderPagination();
    document.getElementById('q-summary').textContent =
      `共找到 ${data.total.toLocaleString()} 条记录`;
  } catch(e) {
    toast('查询失败: ' + e.message, 'err');
  }
}

function renderTable(items) {
  const tbody = document.getElementById('q-tbody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">无结果</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(r => `
    <tr>
      <td>${esc(r.domain)}<button class="copy-btn" onclick="copyText(${JSON.stringify(r.domain)})" title="复制">⎘</button></td>
      <td style="max-width:200px">${esc(r.url)}</td>
      <td>${esc(r.username)}<button class="copy-btn" onclick="copyText(${JSON.stringify(r.username)})" title="复制">⎘</button></td>
      <td>${esc(r.password)}<button class="copy-btn" onclick="copyText(${JSON.stringify(r.password)})" title="复制">⎘</button></td>
      <td style="white-space:nowrap;color:var(--muted)">${fmtDate(r.first_seen)}</td>
      <td style="color:var(--muted);font-size:.78rem">${esc(r.source_file)}</td>
    </tr>`).join('');
}

function renderPagination() {
  const total = state.total, ps = state.pageSize, page = state.page;
  const pages = Math.ceil(total / ps) || 1;
  document.getElementById('pg-info').textContent = `第 ${page} / ${pages} 页`;
  document.getElementById('pg-prev').disabled = page <= 1;
  document.getElementById('pg-next').disabled = page >= pages;
}

function changePage(delta) {
  state.page += delta;
  fetchPage();
  document.getElementById('q-table').scrollIntoView({ behavior:'smooth' });
}

function exportData(fmt) {
  const { q, field, exact } = state.lastQuery || { q:'', field:'all', exact:false };
  const url = `${API}/api/query/export?q=${encodeURIComponent(q)}&field=${field}&exact=${exact}&fmt=${fmt}`;
  window.location.href = url;
}

// ── upload ─────────────────────────────────────────────────────────────────
function dz_over(e) { e.preventDefault(); document.getElementById('dropzone').classList.add('dragover'); }
function dz_leave() { document.getElementById('dropzone').classList.remove('dragover'); }
function dz_drop(e) {
  e.preventDefault(); dz_leave();
  const f = e.dataTransfer.files[0];
  if (f) startUpload(f);
}

async function startUpload(file) {
  if (!file) return;
  clearInterval(pollTimer);
  document.getElementById('job-status').style.display = 'block';
  document.getElementById('failed-section').style.display = 'none';
  document.getElementById('failed-list').innerHTML = '';
  document.getElementById('job-filename').textContent = file.name + '  (' + fmtBytes(file.size) + ')';
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('job-err').textContent = '';

  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(`${API}/api/upload/start`, { method:'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());
    const job = await res.json();
    currentJobId = job.id;
    pollTimer = setInterval(() => pollJob(file.size), 1000);
  } catch(e) {
    toast('上传失败: ' + e.message, 'err');
  }
}

async function pollJob(totalBytes) {
  try {
    const res = await fetch(`${API}/api/upload/job/${currentJobId}`);
    const job = await res.json();

    const pct = totalBytes > 0 ? Math.min(100, (job.processed_bytes / totalBytes * 100)).toFixed(1) : 0;
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('st-bytes').textContent = fmtBytes(job.processed_bytes);
    document.getElementById('st-lines').textContent = job.total_lines.toLocaleString();
    document.getElementById('st-ok').textContent = job.imported_lines.toLocaleString();
    document.getElementById('st-fail').textContent = job.failed_lines.toLocaleString();

    const badgeEl = document.getElementById('job-state-badge');
    const statusMap = { done:'badge-ok', error:'badge-err', processing:'badge-processing', pending:'badge-pending' };
    badgeEl.className = 'badge ' + (statusMap[job.status] || 'badge-pending');
    badgeEl.textContent = job.status;

    if (job.status === 'done' || job.status === 'error') {
      clearInterval(pollTimer);
      document.getElementById('prog-bar').style.width = '100%';
      if (job.error_message) document.getElementById('job-err').textContent = job.error_message;
      if (job.failed_lines > 0) loadFailedLines();
      toast(job.status === 'done' ? `导入完成，共 ${job.imported_lines.toLocaleString()} 条` : '导入出错', job.status === 'done' ? 'ok' : 'err');
    }
  } catch(_) {}
}

async function loadFailedLines() {
  const res = await fetch(`${API}/api/upload/job/${currentJobId}/failed`);
  const lines = await res.json();
  if (!lines.length) return;
  document.getElementById('failed-section').style.display = 'block';
  document.getElementById('failed-list').innerHTML = lines.map(l => `
    <div class="fail-item" id="fl-${l.id}">
      <div class="fail-raw">${esc(l.raw)}</div>
      <div class="fail-fields">
        <div><label>URL</label><input id="fl-url-${l.id}" placeholder="https://example.com" value=""/></div>
        <div><label>Username</label><input id="fl-user-${l.id}" placeholder="用户名"/></div>
        <div><label>Password</label><input id="fl-pass-${l.id}" placeholder="密码"/></div>
        <button class="btn btn-primary" onclick="resolveLine(${l.id})">保存</button>
        <button class="btn btn-danger" onclick="discardLine(${l.id})">忽略</button>
      </div>
    </div>`).join('');
}

async function resolveLine(id) {
  const url = document.getElementById('fl-url-' + id).value;
  const username = document.getElementById('fl-user-' + id).value.trim();
  const password = document.getElementById('fl-pass-' + id).value;
  if (!username) { toast('Username 不能为空', 'err'); return; }
  const res = await fetch(`${API}/api/upload/job/${currentJobId}/failed/${id}/resolve`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, username, password }),
  });
  if (res.ok) {
    document.getElementById('fl-' + id).remove();
    toast('已保存');
  } else toast('保存失败', 'err');
}

async function discardLine(id) {
  const res = await fetch(`${API}/api/upload/job/${currentJobId}/failed/${id}`, { method:'DELETE' });
  if (res.ok) { document.getElementById('fl-' + id).remove(); toast('已忽略'); }
}

async function discardAll() {
  const items = document.querySelectorAll('.fail-item');
  await Promise.all([...items].map(el => {
    const id = el.id.replace('fl-','');
    return fetch(`${API}/api/upload/job/${currentJobId}/failed/${id}`, { method:'DELETE' });
  }));
  document.getElementById('failed-list').innerHTML = '';
  document.getElementById('failed-section').style.display = 'none';
  toast('已全部忽略');
}

// init
doSearch();
</script>
</body>
</html>
